<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Beat Rhythm Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0f172a; /* Tailwind bg-slate-900 */
      overflow: hidden;
      touch-action: none; /* スマホでのスワイプによるスクロール防止 */
    }
    #combo-display {
      transition: transform 0.05s ease-out;
    }
    .neon-text {
      text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor;
    }
  </style>
</head>
<body class="text-white select-none">

  <!-- オーディオファイル -->
  <audio id="bgm" preload="auto">
    <source src="NAGASAKA Meme Friday Night.mp3" type="audio/mpeg">
    <source src="NAGASAKA%20Meme%20Friday%20Night.mp3" type="audio/mpeg">
  </audio>

  <!-- HUD -->
  <div id="hud" class="absolute top-0 left-0 w-full p-4 md:p-8 flex justify-between items-start pointer-events-none hidden z-20">
    <div class="text-left">
      <div class="text-gray-400 text-xs md:text-sm font-bold tracking-widest">SCORE</div>
      <div id="score-display" class="text-2xl md:text-5xl font-black text-white font-mono neon-text" style="color: #fff;">0000000</div>
    </div>
    <div class="text-right">
      <div class="text-gray-400 text-xs md:text-sm font-bold tracking-widest">COMBO</div>
      <div id="combo-display" class="text-4xl md:text-6xl font-black text-pink-500 font-mono neon-text transform scale-100">0</div>
    </div>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md z-30 transition-opacity duration-500">
    <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] text-center px-4 leading-tight">
      NEON BEAT
    </h1>
    <p class="text-gray-300 mb-12 text-sm md:text-xl font-bold bg-black/50 px-4 py-2 rounded-lg border border-gray-700">
      ♪ NAGASAKA Meme Friday Night
    </p>
    <button id="start-btn" class="px-10 py-5 bg-gradient-to-r from-pink-600 to-purple-600 text-white font-black rounded-full text-2xl hover:scale-105 hover:shadow-[0_0_30px_rgba(236,72,153,0.8)] transition-all active:scale-95">
      START GAME
    </button>
    <div class="mt-12 text-center text-gray-400">
      <p class="mb-2">Controls</p>
      <div class="flex gap-2 justify-center font-mono">
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">D</span>
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">F</span>
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">J</span>
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">K</span>
      </div>
      <p class="mt-4 text-sm">or Tap the lanes directly!</p>
    </div>

    <!-- 音源読み込み用フォールバックUI -->
    <div id="file-upload-container" class="mt-8 flex flex-col items-center hidden">
      <p class="text-red-400 text-sm mb-2 font-bold bg-black/50 px-3 py-1 rounded">※環境により音源が自動で読み込めない場合があります</p>
      <p class="text-gray-300 text-xs mb-3">その場合は、手動で音源ファイルを選択してください</p>
      <input type="file" id="audio-upload" accept="audio/*" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-pink-600 file:text-white hover:file:bg-pink-700 cursor-pointer">
    </div>
  </div>

  <!-- リザルト画面 -->
  <div id="result-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 backdrop-blur-lg z-30 hidden opacity-0 transition-opacity duration-1000">
    <h2 class="text-4xl md:text-6xl font-black text-white mb-8 tracking-widest neon-text">TRACK CLEARED</h2>
    <div class="bg-gray-800/80 p-6 md:p-10 rounded-3xl border border-gray-600 shadow-[0_0_40px_rgba(0,0,0,0.8)] flex flex-col gap-6 text-center min-w-[320px] md:min-w-[400px]">
      <div>
        <div class="text-gray-400 text-sm tracking-widest mb-1">FINAL SCORE</div>
        <div id="result-score" class="text-5xl md:text-6xl font-black text-cyan-400 font-mono neon-text">0</div>
      </div>
      <div>
        <div class="text-gray-400 text-sm tracking-widest mb-1">MAX COMBO</div>
        <div id="result-combo" class="text-3xl md:text-4xl font-black text-pink-400 font-mono neon-text">0</div>
      </div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-4 mt-4 text-left border-t border-gray-700 pt-6">
        <div class="text-yellow-400 font-bold tracking-wider">PERFECT<span id="res-perfect" class="text-white float-right font-mono">0</span></div>
        <div class="text-green-400 font-bold tracking-wider">GREAT<span id="res-great" class="text-white float-right font-mono">0</span></div>
        <div class="text-blue-400 font-bold tracking-wider">GOOD<span id="res-good" class="text-white float-right font-mono">0</span></div>
        <div class="text-red-500 font-bold tracking-wider">MISS<span id="res-miss" class="text-white float-right font-mono">0</span></div>
      </div>
    </div>
    <button id="retry-btn" class="mt-10 px-8 py-4 bg-gray-700 text-white font-bold rounded-full text-xl hover:bg-gray-600 hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all active:scale-95">
      PLAY AGAIN
    </button>
  </div>

    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('bgm');

    // 定数と設定

    const KEY_BINDS = ['d', 'f', 'j', 'k'];
    const COLORS = [
      { note: '#ff0055', glow: 'rgba(255, 0, 85, 0.6)' },  // Pink
      { note: '#00ffcc', glow: 'rgba(0, 255, 204, 0.6)' },  // Cyan
      { note: '#cc00ff', glow: 'rgba(204, 0, 255, 0.6)' },  // Purple
      { note: '#ffcc00', glow: 'rgba(255, 204, 0, 0.6)' }   // Yellow
    ];

    // ゲーム状態
    let gameState = 'init'; // init, playing, result
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let stats = { perfect: 0, great: 0, good: 0, miss: 0 };
    let gameTime = 0;
    
    // 時間同期用
    let lastAudioTime = 0;
    let timeOffset = 0;

    let notes = [];
    let particles = [];
    let floatingTexts = [];
    let keyStates = [false, false, false, false];
    let keyPressEffects = [0, 0, 0, 0];
    
    // レイアウト変数
    let canvasWidth, canvasHeight, laneWidth, hitLineY, startX;

    // クラス定義
    class Note {
      constructor(lane, time) {
        this.lane = lane;
        this.time = time;
        this.hit = false;
        this.missed = false;
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.04 + 0.02;
        this.size = Math.random() * 5 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    class FloatingText {
      constructor(text, lane, color) {
        this.text = text;
        this.x = startX + lane * laneWidth + laneWidth / 2;
        this.y = hitLineY - 40;
        this.color = color;
        this.life = 1.0;
        this.vy = -1.5;
      }
      update() {
        this.y += this.vy;
        this.life -= 0.025;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        // PCとスマホで文字サイズを調整
        const fontSize = laneWidth > 60 ? 28 : 20;
        ctx.font = `900 ${fontSize}px "Orbitron"`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;
      }
    }

    // リサイズ処理
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvasWidth = canvas.width;
      canvasHeight = canvas.height;
      
      // レーンの幅（スマホ画面に合わせて調整）
      const maxLaneWidth = 100;
      laneWidth = Math.min(canvasWidth / 4.5, maxLaneWidth);
      startX = (canvasWidth - laneWidth * LANE_COUNT) / 2;
      hitLineY = canvasHeight * 0.85;
    }
    window.addEventListener('resize', resize);
    resize();

    // イベントリスナー（メタデータ読み込み時）
    audio.addEventListener('loadedmetadata', () => {
      if (!isNaN(audio.duration)) generateBeatmap(audio.duration);
    });
    audio.addEventListener('ended', showResult);

    // 音源エラー検知
    audio.addEventListener('error', () => {
      document.getElementById('file-upload-container').classList.remove('hidden');
    });

    // カスタムメッセージ表示
    function showMessage(msg, isError = true) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-[0_0_20px_rgba(0,0,0,0.5)] z-50 font-bold text-sm transition-opacity duration-300 ${isError ? 'bg-red-600 text-white' : 'bg-green-500 text-black'}`;
      msgDiv.innerText = msg;
      document.body.appendChild(msgDiv);
      setTimeout(() => {
        msgDiv.style.opacity = '0';
        setTimeout(() => msgDiv.remove(), 300);
      }, 3000);
    }

    // ファイルアップロードの処理
    document.getElementById('audio-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        audio.src = url;
        audio.load();
        showMessage('音源をセットしました！', false);
        document.getElementById('file-upload-container').innerHTML = '<p class="text-green-400 font-bold bg-black/50 px-4 py-2 rounded-lg">音源準備完了</p>';
      }
    });

    // 入力ハンドリング
    function handleInputDown(laneIndex) {
      if (gameState !== 'playing' || laneIndex === -1) return;
      if (!keyStates[laneIndex]) {
        keyStates[laneIndex] = true;
        keyPressEffects[laneIndex] = 1.0;
        processHit(laneIndex);
      }
    }

    function handleInputUp(laneIndex) {
      if (laneIndex !== -1) {
        keyStates[laneIndex] = false;
      }
    }

    // キーボード
    window.addEventListener('keydown', (e) => {
      const laneIndex = KEY_BINDS.indexOf(e.key.toLowerCase());
      handleInputDown(laneIndex);
    });
    window.addEventListener('keyup', (e) => {
      const laneIndex = KEY_BINDS.indexOf(e.key.toLowerCase());
      handleInputUp(laneIndex);
    });

    // タッチ操作
    const activeTouches = {};
    function getLaneFromX(x) {
      if (x < startX || x > startX + laneWidth * LANE_COUNT) return -1;
      return Math.floor((x - startX) / laneWidth);
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = getLaneFromX(touch.clientX);
        if (laneIndex !== -1) {
          activeTouches[touch.identifier] = laneIndex;
          handleInputDown(laneIndex);
        }
      }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = activeTouches[touch.identifier];
        if (laneIndex !== undefined) {
          handleInputUp(laneIndex);
          delete activeTouches[touch.identifier];
        }
      }
    }, {passive: false});

    canvas.addEventListener('touchcancel', (e) => {
      // touchcancel時もリセット
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = activeTouches[touch.identifier];
        if (laneIndex !== undefined) {
          handleInputUp(laneIndex);
          delete activeTouches[touch.identifier];
        }
      }
    });

    // 判定処理
    function processHit(lane) {
      const hitWindow = 0.2; // ±200ms
      
      const targetNotes = notes.filter(n => !n.hit && !n.missed && n.lane === lane);
      if (targetNotes.length === 0) return;
      
      targetNotes.sort((a, b) => a.time - b.time);
      const note = targetNotes[0];
      
      const diff = Math.abs(note.time - gameTime);
      
      if (diff <= hitWindow) {
        note.hit = true;
        
        // パーティクル生成
        for(let i=0; i<15; i++) {
          particles.push(new Particle(startX + lane * laneWidth + laneWidth/2, hitLineY, COLORS[lane].note));
        }
        
        let judgement = '';
        let scoreAdd = 0;
        let color = '';
        
        if (diff <= 0.05) {
          judgement = 'PERFECT';
          scoreAdd = 1000;
          stats.perfect++;
          color = '#fbbf24'; // yellow
        } else if (diff <= 0.1) {
          judgement = 'GREAT';
          scoreAdd = 500;
          stats.great++;
          color = '#4ade80'; // green
        } else {
          judgement = 'GOOD';
          scoreAdd = 100;
          stats.good++;
          color = '#60a5fa'; // blue
        }
        
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        score += scoreAdd + combo * 10;
        
        floatingTexts.push(new FloatingText(judgement, lane, color));
        updateHUD();
      }
    }

    // UI更新
    function updateHUD() {
      document.getElementById('score-display').innerText = String(score).padStart(7, '0');
      const comboEl = document.getElementById('combo-display');
      comboEl.innerText = combo;
      
      // ポップエフェクト
      comboEl.classList.remove('scale-150', 'text-white');
      void comboEl.offsetWidth; // 強制リフロー
      if (combo > 0) {
        comboEl.classList.add('scale-150');
        if (combo % 10 === 0) comboEl.classList.add('text-white');
      }
    }

    // タイム更新 (滑らかな補間)
    function updateTime() {
      if (gameState !== 'playing') return;
      const currentAudioTime = audio.currentTime;
      
      if (currentAudioTime !== lastAudioTime) {
        gameTime = currentAudioTime;
        lastAudioTime = currentAudioTime;
        timeOffset = performance.now() / 1000 - currentAudioTime;
      } else {
        gameTime = performance.now() / 1000 - timeOffset;
      }
    }

    // 描画処理
    function draw() {
      // 背景クリア
      ctx.fillStyle = '#0f172a'; // tailwind slate-900
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      
      // グリッド背景アニメーション
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;
      const gridSize = 60;
      
      for (let x = (canvasWidth/2)%gridSize; x < canvasWidth; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasHeight); ctx.stroke();
      }
      const yOffset = (gameTime * 150) % gridSize;
      for (let y = yOffset; y < canvasHeight; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasWidth, y); ctx.stroke();
      }

      // レーンの描画
      for (let i = 0; i < LANE_COUNT; i++) {
        const x = startX + i * laneWidth;
        
        // 背景
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(x, 0, laneWidth, canvasHeight);
        
        // 境界線
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.beginPath();
        ctx.moveTo(x, 0); ctx.lineTo(x, canvasHeight);
        ctx.stroke();
        
        // 押下エフェクト
        if (keyPressEffects[i] > 0) {
          const gradient = ctx.createLinearGradient(0, hitLineY, 0, hitLineY - 300);
          gradient.addColorStop(0, COLORS[i].glow);
          gradient.addColorStop(1, 'rgba(0,0,0,0)');
          
          ctx.globalCompositeOperation = 'lighter';
          ctx.fillStyle = gradient;
          ctx.fillRect(x, 0, laneWidth, hitLineY);
          ctx.globalCompositeOperation = 'source-over';
          
          keyPressEffects[i] -= 0.08;
          if (keyPressEffects[i] < 0) keyPressEffects[i] = 0;
        }
      }
      
      // 右端の境界線
      ctx.beginPath();
      ctx.moveTo(startX + laneWidth * LANE_COUNT, 0);
      ctx.lineTo(startX + laneWidth * LANE_COUNT, canvasHeight);
      ctx.stroke();

      // 判定ライン
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#fff';
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(startX, hitLineY);
      ctx.lineTo(startX + laneWidth * LANE_COUNT, hitLineY);
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      // ノーツの描画
      const noteSpeed = canvasHeight * 0.9; // 1秒間に進むピクセル数
      
      ctx.globalCompositeOperation = 'lighter';
      notes.forEach(note => {
        if (note.hit || note.missed) return;
        
        const y = hitLineY - (note.time - gameTime) * noteSpeed;
        
        // 画面外はスキップ
        if (y < -50 || y > canvasHeight + 50) return;
        
        const x = startX + note.lane * laneWidth;
        const nHeight = 24;
        
        // ノーツの本体
        ctx.shadowBlur = 15;
        ctx.shadowColor = COLORS[note.lane].note;
        ctx.fillStyle = COLORS[note.lane].note;
        
        ctx.beginPath();
        ctx.roundRect(x + 6, y - nHeight/2, laneWidth - 12, nHeight, 8);
        ctx.fill();
        
        // ハイライト
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.roundRect(x + laneWidth/2 - 12, y - nHeight/4, 24, nHeight/2, 4);
        ctx.fill();
      });
      ctx.globalCompositeOperation = 'source-over';

      // 上部のグラデーションフェード（ノーツがフワッと現れる効果）
      const topFade = ctx.createLinearGradient(0, 0, 0, canvasHeight * 0.15);
      topFade.addColorStop(0, '#0f172a'); // slate-900
      topFade.addColorStop(1, 'rgba(15, 23, 42, 0)');
      ctx.fillStyle = topFade;
      ctx.fillRect(startX, 0, laneWidth * LANE_COUNT, canvasHeight * 0.15);

      // パーティクルの描画
      ctx.globalCompositeOperation = 'lighter';
      particles.forEach(p => p.draw(ctx));
      ctx.globalCompositeOperation = 'source-over';
      
      // テキストの描画
      floatingTexts.forEach(ft => ft.draw(ctx));
    }

    // メインループ
    function gameLoop() {
      if (gameState === 'playing') {
        updateTime();
        
        // ミス判定
        const missWindow = 0.2;
        notes.forEach(note => {
          if (!note.hit && !note.missed && gameTime - note.time > missWindow) {
            note.missed = true;
            combo = 0;
            stats.miss++;
            floatingTexts.push(new FloatingText('MISS', note.lane, '#ef4444')); // red
            updateHUD();
          }
        });
        
        particles.forEach(p => p.update());
        particles = particles.filter(p => p.life > 0);
        
        floatingTexts.forEach(ft => ft.update());
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);
      }
      
      draw();
      
      if (gameState === 'playing' || particles.length > 0 || floatingTexts.length > 0) {
        requestAnimationFrame(gameLoop);
      }
    }

    // リザルト表示
    function showResult() {
      gameState = 'result';
      document.getElementById('hud').classList.add('hidden');
      
      const res = document.getElementById('result-screen');
      res.classList.remove('hidden');
      setTimeout(() => {
        res.classList.remove('opacity-0');
        res.classList.add('opacity-100');
      }, 50);
      
      document.getElementById('result-score').innerText = score;
      document.getElementById('result-combo').innerText = maxCombo;
      document.getElementById('res-perfect').innerText = stats.perfect;
      document.getElementById('res-great').innerText = stats.great;
      document.getElementById('res-good').innerText = stats.good;
      document.getElementById('res-miss').innerText = stats.miss;
    }

    // スタートボタン処理
    document.getElementById('start-btn').addEventListener('click', () => {
      // エラーでソースがない場合
      if (audio.networkState === HTMLMediaElement.NETWORK_NO_SOURCE) {
        document.getElementById('file-upload-container').classList.remove('hidden');
        showMessage('音源が見つかりません。手動でファイルを選択してください。');
        return;
      }

      // まず音声を再生してみる
      audio.currentTime = 0;
      audio.play().then(() => {
        // 再生に成功したらゲーム画面へ移行
        startGame();
      }).catch(err => {
        console.error("Audio playback failed:", err);
        showMessage("音源の再生に失敗しました。手動でファイルを選択してください。");
        document.getElementById('file-upload-container').classList.remove('hidden');
      });
    });

    function startGame() {
      // 譜面生成 (ロードが遅れた場合のフォールバック)
      if (notes.length === 0) {
        const dur = (!isNaN(audio.duration) && audio.duration > 0) ? audio.duration : 180;
        generateBeatmap(dur);
      } else {
        // リセット
        notes.forEach(n => { n.hit = false; n.missed = false; });
      }

      document.getElementById('start-screen').classList.add('opacity-0');
      setTimeout(() => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        score = 0; combo = 0; maxCombo = 0;
        stats = { perfect: 0, great: 0, good: 0, miss: 0 };
        updateHUD();
        
        gameState = 'playing';
        lastAudioTime = audio.currentTime;
        timeOffset = performance.now() / 1000 - audio.currentTime;
        requestAnimationFrame(gameLoop);
      }, 500);
    }

    // リトライボタン処理
    document.getElementById('retry-btn').addEventListener('click', () => {
      const res = document.getElementById('result-screen');
      res.classList.remove('opacity-100');
      res.classList.add('opacity-0');
      
      setTimeout(() => {
        res.classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('start-screen').classList.remove('opacity-0');
      }, 500);
      
      audio.pause();
      audio.currentTime = 0;
    });

    // 初期描画
    draw();

  </script>
</body>
</html>
