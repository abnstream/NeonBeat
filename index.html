<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Beat Rhythm Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0f172a; /* Tailwind bg-slate-900 */
      overflow: hidden;
      touch-action: none; /* スマホでのスワイプによるスクロール防止 */
    }
    #combo-display {
      transition: transform 0.05s ease-out;
    }
    .neon-text {
      text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor;
    }
  </style>
</head>
<body class="text-white select-none">

  <!-- オーディオファイル -->
  <audio id="bgm" preload="auto">
    <source src="NAGASAKA Meme Friday Night.mp3" type="audio/mpeg">
    <source src="NAGASAKA%20Meme%20Friday%20Night.mp3" type="audio/mpeg">
  </audio>

  <!-- HUD -->
  <div id="hud" class="absolute top-0 left-0 w-full p-4 md:p-8 flex justify-between items-start pointer-events-none hidden z-20">
    <div class="text-left">
      <div class="text-gray-400 text-xs md:text-sm font-bold tracking-widest">SCORE</div>
      <div id="score-display" class="text-2xl md:text-5xl font-black text-white font-mono neon-text" style="color: #fff;">0000000</div>
    </div>
    <div class="text-right">
      <div class="text-gray-400 text-xs md:text-sm font-bold tracking-widest">COMBO</div>
      <div id="combo-display" class="text-4xl md:text-6xl font-black text-pink-500 font-mono neon-text transform scale-100">0</div>
    </div>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md z-30 transition-opacity duration-500">
    <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] text-center px-4 leading-tight">
      NEON BEAT
    </h1>
    
    <!-- 効果音トグル -->
    <div class="mb-4 flex items-center gap-3 bg-slate-800/80 px-5 py-2 rounded-full border border-slate-600 hover:bg-slate-700 transition-colors cursor-pointer" onclick="document.getElementById('se-toggle').click()">
      <input type="checkbox" id="se-toggle" checked class="w-5 h-5 accent-pink-500 cursor-pointer pointer-events-none">
      <label for="se-toggle" class="text-sm md:text-base font-bold text-gray-300 tracking-wider select-none pointer-events-none">SOUND EFFECTS</label>
    </div>

    <p class="text-gray-300 mb-12 text-sm md:text-xl font-bold bg-black/50 px-4 py-2 rounded-lg border border-gray-700">
      ♪ NAGASAKA Meme Friday Night
    </p>
    <button id="start-btn" class="px-10 py-5 bg-gradient-to-r from-pink-600 to-purple-600 text-white font-black rounded-full text-2xl hover:scale-105 hover:shadow-[0_0_30px_rgba(236,72,153,0.8)] transition-all active:scale-95">

    <div class="mt-12 text-center text-gray-400">

      <div class="flex gap-2 justify-center font-mono">
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">D</span>
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">F</span>
        <span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded">J</span>

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('bgm');

    // 定数と設定
    const LANE_COUNT = 4;
    const KEY_BINDS = ['d', 'f', 'j', 'k'];
    const COLORS = [
      { note: '#ff0055', glow: 'rgba(255, 0, 85, 0.6)' },  // Pink
      { note: '#00ffcc', glow: 'rgba(0, 255, 204, 0.6)' },  // Cyan
      { note: '#cc00ff', glow: 'rgba(204, 0, 255, 0.6)' },  // Purple
      { note: '#ffcc00', glow: 'rgba(255, 204, 0, 0.6)' }   // Yellow
    ];

    // ゲーム状態
    let gameState = 'init'; // init, playing, result
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let stats = { perfect: 0, great: 0, good: 0, miss: 0 };
    let gameTime = 0;
    
    // 時間同期用
    let lastAudioTime = 0;
    let timeOffset = 0;

    let notes = [];
    let particles = [];
    let floatingTexts = [];
    let keyStates = [false, false, false, false];
    let keyPressEffects = [0, 0, 0, 0];
    
    // レイアウト変数
    let canvasWidth, canvasHeight, laneWidth, hitLineY, startX;

    // --- 効果音 (Web Audio API) の設定 ---
    let audioCtx;
    let isSEEnabled = true; // 追加：効果音のON/OFF状態
    // レーンごとの音程: ド(C5), ミ(E5), ソ(G5), 高いド(C6)
    const SE_FREQUENCIES = [523.25, 659.25, 783.99, 1046.50]; 

    function initSE() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // AudioContextが停止している場合（一部のブラウザの自動再生ポリシー対策）
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSE(lane) {
      if (!isSEEnabled || !audioCtx) return; // チェックが外れていれば鳴らさない
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      // 音色設定
      osc.type = 'triangle'; 
      osc.frequency.setValueAtTime(SE_FREQUENCIES[lane], audioCtx.currentTime);
      
      // 音量と減衰（パーカッシブな音）
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
    // ------------------------------------

    // クラス定義
    class Note {
      constructor(lane, time, duration = 0) {
        this.lane = lane;
        this.time = time;
        this.duration = duration;
        this.isLong = duration > 0;
        this.endTime = time + duration;
        this.hit = false;
        this.missed = false;
        this.releaseHit = false;
        this.releaseMissed = false;
        this.active = false;
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.04 + 0.02;
        this.size = Math.random() * 5 + 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    class FloatingText {
      constructor(text, lane, color) {
        this.text = text;
        this.x = startX + lane * laneWidth + laneWidth / 2;
        this.y = hitLineY - 40;
        this.color = color;
        this.life = 1.0;
        this.vy = -1.5;
      }
      update() {
        this.y += this.vy;
        this.life -= 0.025;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        // PCとスマホで文字サイズを調整
        const fontSize = laneWidth > 60 ? 28 : 20;
        ctx.font = `900 ${fontSize}px "Orbitron"`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;
      }
    }

    // リサイズ処理
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvasWidth = canvas.width;
      canvasHeight = canvas.height;
      
      // レーンの幅（スマホ画面に合わせて調整）
      const maxLaneWidth = 100;
      laneWidth = Math.min(canvasWidth / 4.5, maxLaneWidth);
      startX = (canvasWidth - laneWidth * LANE_COUNT) / 2;
      hitLineY = canvasHeight * 0.85;
    }
    window.addEventListener('resize', resize);
    resize();

    // コンボボーナスの倍率（元は10。数値を下げるとコンボの比重が下がり、精度の比重が上がります）
    const COMBO_BONUS_MULTIPLIER = 2; 

    // スコア加算の共通関数
    function addScore(lane, diff) {
      for(let i=0; i<15; i++) {
        particles.push(new Particle(startX + lane * laneWidth + laneWidth/2, hitLineY, COLORS[lane].note));
      }
      
      let judgement = '';
      let scoreAdd = 0;
      let color = '';
      
      if (diff <= 0.05) {
        judgement = 'PERFECT';
        scoreAdd = 1000;
        stats.perfect++;
        color = '#fbbf24';
      } else if (diff <= 0.1) {
        judgement = 'GREAT';
        scoreAdd = 800;
        stats.great++;
        color = '#4ade80';
      } else {
        judgement = 'GOOD';
        scoreAdd = 500;
        stats.good++;
        color = '#60a5fa';
      }
      
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      
      // ここを修正：コンボボーナスの倍率を変数に変更
      score += scoreAdd + combo * COMBO_BONUS_MULTIPLIER;
      
      floatingTexts.push(new FloatingText(judgement, lane, color));
      updateHUD();
    }

    // 入力ハンドリング
    function handleInputDown(laneIndex) {
      if (gameState !== 'playing' || laneIndex === -1) return;
      if (!keyStates[laneIndex]) {
        keyStates[laneIndex] = true;
        keyPressEffects[laneIndex] = 1.0;
        
        playSE(laneIndex); // 効果音を鳴らす
        
        const hitWindow = 0.2;
        let targetNotes = notes.filter(n => n.lane === laneIndex && !n.hit && !n.missed && Math.abs(n.time - gameTime) <= hitWindow);
        
        if (targetNotes.length > 0) {
          targetNotes.sort((a, b) => a.time - b.time);
          const note = targetNotes[0];
          const diff = Math.abs(note.time - gameTime);
          
          note.hit = true;
          if (note.isLong) {
            note.active = true;
          }
          addScore(laneIndex, diff);
        }
      }
    }

    function handleInputUp(laneIndex) {
      if (laneIndex !== -1) {
        keyStates[laneIndex] = false;
        
        if (gameState === 'playing') {
          const hitWindow = 0.2;
          let activeNotes = notes.filter(n => n.lane === laneIndex && n.active);
          
          activeNotes.forEach(note => {
            note.active = false;
            const diff = Math.abs(note.endTime - gameTime);
            if (diff <= hitWindow) {
              note.releaseHit = true;
              playSE(laneIndex); // 離した時の効果音
              addScore(laneIndex, diff);
            } else {
              note.releaseMissed = true;
              combo = 0;
              stats.miss++;
              floatingTexts.push(new FloatingText('MISS', laneIndex, '#ef4444'));
              updateHUD();
            }
          });
        }
      }
    }

    // キーボード
    window.addEventListener('keydown', (e) => {
      const laneIndex = KEY_BINDS.indexOf(e.key.toLowerCase());
      handleInputDown(laneIndex);
    });
    window.addEventListener('keyup', (e) => {
      const laneIndex = KEY_BINDS.indexOf(e.key.toLowerCase());
      handleInputUp(laneIndex);
    });

    // タッチ操作
    const activeTouches = {};
    function getLaneFromX(x) {
      if (x < startX || x > startX + laneWidth * LANE_COUNT) return -1;
      return Math.floor((x - startX) / laneWidth);
    }

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      // スマホではタッチ時にAudioContextを再開
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = getLaneFromX(touch.clientX);
        if (laneIndex !== -1) {
          activeTouches[touch.identifier] = laneIndex;
          handleInputDown(laneIndex);
        }
      }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = activeTouches[touch.identifier];
        if (laneIndex !== undefined) {
          handleInputUp(laneIndex);
          delete activeTouches[touch.identifier];
        }
      }
    }, {passive: false});

    canvas.addEventListener('touchcancel', (e) => {
      // touchcancel時もリセット
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const laneIndex = activeTouches[touch.identifier];
        if (laneIndex !== undefined) {
          handleInputUp(laneIndex);
          delete activeTouches[touch.identifier];
        }
      }
    });

    // ノーツ本体描画の共通関数
    function drawNoteBody(ctx, x, y, lane) {
      const nHeight = 24;
      ctx.shadowBlur = 15;
      ctx.shadowColor = COLORS[lane].note;
      ctx.fillStyle = COLORS[lane].note;
      ctx.beginPath();
      ctx.roundRect(x + 6, y - nHeight/2, laneWidth - 12, nHeight, 8);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.beginPath();
      ctx.roundRect(x + laneWidth/2 - 12, y - nHeight/4, 24, nHeight/2, 4);
      ctx.fill();
    }

    // UI更新
    function updateHUD() {
      document.getElementById('score-display').innerText = String(score).padStart(7, '0');
      const comboEl = document.getElementById('combo-display');
      comboEl.innerText = combo;
      
      // ポップエフェクト
      comboEl.classList.remove('scale-150', 'text-white');
      void comboEl.offsetWidth; // 強制リフロー
      if (combo > 0) {
        comboEl.classList.add('scale-150');
        if (combo % 10 === 0) comboEl.classList.add('text-white');
      }
    }

    // タイム更新 (滑らかな補間)
    function updateTime() {
      if (gameState !== 'playing') return;
      const currentAudioTime = audio.currentTime;
      
      if (currentAudioTime !== lastAudioTime) {
        gameTime = currentAudioTime;
        lastAudioTime = currentAudioTime;
        timeOffset = performance.now() / 1000 - currentAudioTime;
      } else {
        gameTime = performance.now() / 1000 - timeOffset;
      }
    }

    // 描画処理
    function draw() {
      // 背景クリア
      ctx.fillStyle = '#0f172a'; // tailwind slate-900
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      
      // グリッド背景アニメーション
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;
      const gridSize = 60;
      
      for (let x = (canvasWidth/2)%gridSize; x < canvasWidth; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasHeight); ctx.stroke();
      }
      const yOffset = (gameTime * 150) % gridSize;
      for (let y = yOffset; y < canvasHeight; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasWidth, y); ctx.stroke();
      }

      // レーンの描画
      for (let i = 0; i < LANE_COUNT; i++) {
        const x = startX + i * laneWidth;
        
        // 背景
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(x, 0, laneWidth, canvasHeight);
        
        // 境界線
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.beginPath();
        ctx.moveTo(x, 0); ctx.lineTo(x, canvasHeight);
        ctx.stroke();
        
        // 押下エフェクト
        if (keyPressEffects[i] > 0) {
          const gradient = ctx.createLinearGradient(0, hitLineY, 0, hitLineY - 300);
          gradient.addColorStop(0, COLORS[i].glow);
          gradient.addColorStop(1, 'rgba(0,0,0,0)');
          
          ctx.globalCompositeOperation = 'lighter';
          ctx.fillStyle = gradient;
          ctx.fillRect(x, 0, laneWidth, hitLineY);
          ctx.globalCompositeOperation = 'source-over';
          
          keyPressEffects[i] -= 0.08;
          if (keyPressEffects[i] < 0) keyPressEffects[i] = 0;
        }
      }
      
      // 右端の境界線
      ctx.beginPath();
      ctx.moveTo(startX + laneWidth * LANE_COUNT, 0);
      ctx.lineTo(startX + laneWidth * LANE_COUNT, canvasHeight);
      ctx.stroke();

      // 判定ライン
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#fff';
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(startX, hitLineY);
      ctx.lineTo(startX + laneWidth * LANE_COUNT, hitLineY);
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      // ノーツの描画
      const noteSpeed = canvasHeight * 0.9; // 1秒間に進むピクセル数
      
      ctx.globalCompositeOperation = 'lighter';
      notes.forEach(note => {
        if (note.isLong) {
          if (note.releaseHit || note.releaseMissed) return;
          if (note.missed && !note.active) return;
          
          let startY = hitLineY - (note.time - gameTime) * noteSpeed;
          let endY = hitLineY - (note.endTime - gameTime) * noteSpeed;
          
          if (note.active) {
            startY = hitLineY; // 押下中は下端を判定ラインに固定
            // 押下中のパーティクルエフェクト
            if (Math.random() > 0.6) {
              particles.push(new Particle(startX + note.lane * laneWidth + laneWidth/2, hitLineY, COLORS[note.lane].note));
            }
          }
          
          if (endY > canvasHeight + 50 || startY < -50) return;
          
          const x = startX + note.lane * laneWidth;
          const w = laneWidth - 12;
          
          // ロングノーツの帯を描画
          ctx.fillStyle = COLORS[note.lane].note;
          ctx.globalAlpha = note.active ? 0.7 : 0.4;
          ctx.beginPath();
          ctx.roundRect(x + 6, endY, w, startY - endY, 4);
          ctx.fill();
          ctx.globalAlpha = 1.0;
          
          // 開始・終了タイミングの頭を描画
          if (!note.hit && startY >= -50 && startY <= canvasHeight + 50) {
            drawNoteBody(ctx, x, startY, note.lane);
          }
          if (endY >= -50 && endY <= canvasHeight + 50) {
            drawNoteBody(ctx, x, endY, note.lane);
          }
        } else {
          if (note.hit || note.missed) return;
          const y = hitLineY - (note.time - gameTime) * noteSpeed;
          if (y < -50 || y > canvasHeight + 50) return;
          const x = startX + note.lane * laneWidth;
          drawNoteBody(ctx, x, y, note.lane);
        }
      });
      ctx.globalCompositeOperation = 'source-over';

      // 上部のグラデーションフェード（ノーツがフワッと現れる効果）
      const topFade = ctx.createLinearGradient(0, 0, 0, canvasHeight * 0.15);
      topFade.addColorStop(0, '#0f172a'); // slate-900
      topFade.addColorStop(1, 'rgba(15, 23, 42, 0)');
      ctx.fillStyle = topFade;
      ctx.fillRect(startX, 0, laneWidth * LANE_COUNT, canvasHeight * 0.15);

      // パーティクルの描画
      ctx.globalCompositeOperation = 'lighter';
      particles.forEach(p => p.draw(ctx));
      ctx.globalCompositeOperation = 'source-over';
      
      // テキストの描画
      floatingTexts.forEach(ft => ft.draw(ctx));
    }

    // メインループ
    function gameLoop() {
      if (gameState === 'playing') {
        updateTime();
        
        // ミス判定
        const missWindow = 0.2;
        notes.forEach(note => {
          // 押し始めのミス
          if (!note.hit && !note.missed && gameTime - note.time > missWindow) {
            note.missed = true;
            combo = 0;
            stats.miss++;
            floatingTexts.push(new FloatingText('MISS', note.lane, '#ef4444')); // red
            updateHUD();
          }
          // 離すタイミングのミス (押しっぱなしで過ぎてしまった場合)
          if (note.isLong && note.active && !note.releaseHit && !note.releaseMissed && gameTime - note.endTime > missWindow) {
            note.active = false;
            note.releaseMissed = true;
            combo = 0;
            stats.miss++;
            floatingTexts.push(new FloatingText('MISS', note.lane, '#ef4444'));
            updateHUD();
          }
        });
        
        particles.forEach(p => p.update());
        particles = particles.filter(p => p.life > 0);
        
        floatingTexts.forEach(ft => ft.update());
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);
      }
      
      draw();
      
      if (gameState === 'playing' || particles.length > 0 || floatingTexts.length > 0) {
        requestAnimationFrame(gameLoop);
      }
    }

    // リザルト表示
    function showResult() {
      gameState = 'result';
      document.getElementById('hud').classList.add('hidden');
      
      const res = document.getElementById('result-screen');
      res.classList.remove('hidden');
      setTimeout(() => {
        res.classList.remove('opacity-0');
        res.classList.add('opacity-100');
      }, 50);
      
      document.getElementById('result-score').innerText = score;
      
      // 達成率の動的計算 (ロングノーツは開始・終了の2回判定になるため総判定数を出す)
      let totalJudgements = 0;
      notes.forEach(n => {
        totalJudgements += n.isLong ? 2 : 1;
      });
      
      // ここを修正：理論値の計算にも変数を適用
      let maxScore = 1000 * totalJudgements;
      maxScore += COMBO_BONUS_MULTIPLIER * totalJudgements * (totalJudgements + 1) / 2;
      
      let percent = (score / maxScore) * 100;
      if (percent > 100) percent = 100; // 万が一超えた場合のストッパー
      if (isNaN(percent)) percent = 0;
      document.getElementById('result-percent').innerText = percent.toFixed(2);
      
      document.getElementById('result-combo').innerText = maxCombo;
      document.getElementById('res-perfect').innerText = stats.perfect;
      document.getElementById('res-great').innerText = stats.great;
      document.getElementById('res-good').innerText = stats.good;
      document.getElementById('res-miss').innerText = stats.miss;
      
      // 判定割合ゲージの幅を更新
      const actualTotal = stats.perfect + stats.great + stats.good + stats.miss;
      if (actualTotal > 0) {
        setTimeout(() => {
          document.getElementById('bar-perfect').style.width = `${(stats.perfect / actualTotal) * 100}%`;
          document.getElementById('bar-great').style.width = `${(stats.great / actualTotal) * 100}%`;
          document.getElementById('bar-good').style.width = `${(stats.good / actualTotal) * 100}%`;
          document.getElementById('bar-miss').style.width = `${(stats.miss / actualTotal) * 100}%`;
        }, 100);
      }
    }

    // スタートボタン処理
    document.getElementById('start-btn').addEventListener('click', () => {
      initSE(); // 効果音エンジン初期化

      // エラーでソースがない場合
      if (audio.networkState === HTMLMediaElement.NETWORK_NO_SOURCE) {
        document.getElementById('file-upload-container').classList.remove('hidden');
        showMessage('音源が見つかりません。手動でファイルを選択してください。');
        return;
      }

      // まず音声を再生してみる
      audio.currentTime = 0;
      audio.play().then(() => {
        // 再生に成功したらゲーム画面へ移行
        startGame();
      }).catch(err => {
        console.error("Audio playback failed:", err);
        showMessage("音源の再生に失敗しました。手動でファイルを選択してください。");
        document.getElementById('file-upload-container').classList.remove('hidden');
      });
    });

    function startGame() {
      // 譜面生成 (ロードが遅れた場合のフォールバック)
      if (notes.length === 0) {
        const dur = (!isNaN(audio.duration) && audio.duration > 0) ? audio.duration : 180;
        generateBeatmap(dur);
      } else {
        // リセット (ロングノーツのプロパティも確実に初期化する)
        notes.forEach(n => { 
          n.hit = false; 
          n.missed = false; 
          n.releaseHit = false;
          n.releaseMissed = false;
          n.active = false;
        });
      }

      document.getElementById('start-screen').classList.add('opacity-0');
      setTimeout(() => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        score = 0; combo = 0; maxCombo = 0;
        stats = { perfect: 0, great: 0, good: 0, miss: 0 };
        updateHUD();
        
        gameState = 'playing';
        lastAudioTime = audio.currentTime;
        timeOffset = performance.now() / 1000 - audio.currentTime;
        requestAnimationFrame(gameLoop);
      }, 500);
    }

    // リトライボタン処理
    document.getElementById('retry-btn').addEventListener('click', () => {
      const res = document.getElementById('result-screen');
      res.classList.remove('opacity-100');
      res.classList.add('opacity-0');
      
      // ゲージのアニメーションをリセット
      document.getElementById('bar-perfect').style.width = '0%';
      document.getElementById('bar-great').style.width = '0%';
      document.getElementById('bar-good').style.width = '0%';
      document.getElementById('bar-miss').style.width = '0%';
      
      setTimeout(() => {
        res.classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('start-screen').classList.remove('opacity-0');
      }, 500);
      
      audio.pause();
      audio.currentTime = 0;
    });

    // 初期描画
    draw();

  </script>
</body>
</html>
